<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Gokuldham Tournament</title>

  <style>
    body{
      margin:0;
      padding:0;
      background:#050816;
      font-family:Arial, sans-serif;
      color:white;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
      overflow:hidden;
    }

    .card{
      background:#0f172a;
      padding:40px;
      border-radius:20px;
      text-align:center;
      width:90%;
      max-width:450px;
      box-shadow:0 0 30px rgba(255,204,0,0.25);
      border:1px solid rgba(255,255,255,0.08);
    }

    .logo{
      width:140px;
      border-radius:20px;
      margin-bottom:20px;
      box-shadow:0 0 20px rgba(255,204,0,0.4);
    }

    h1{
      margin:10px 0;
      font-size:34px;
      color:#ffcc00;
    }

    p{
      color:#cbd5e1;
      margin-bottom:30px;
      line-height:1.6;
    }

    .btn{
      display:inline-block;
      padding:16px 35px;
      background:#ffcc00;
      color:black;
      text-decoration:none;
      font-size:20px;
      font-weight:bold;
      border-radius:12px;
      transition:0.25s;
    }

    .btn:hover{
      transform:scale(1.05);
      background:#ffd633;
    }

    .footer{
      margin-top:25px;
      font-size:14px;
      color:#94a3b8;
    }
  </style>
</head>

<body>

  <div class="card">
    

    <h1>🏆 Gokuldham Tournament</h1>

    <p>
      Join exciting tournaments, compete with players,
      and win amazing prizes directly from your mobile.
    </p>

    <!-- APK DOWNLOAD BUTTON -->
    <a 
      href=""
      class="btn"
      download
    >
      Download APK
    </a>

    <div class="footer">
      Powered by Gokuldham Cloud ⚡
    </div>

  </div>

</body>
</html>
